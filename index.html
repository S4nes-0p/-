<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0A0A1A;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
  }

  .stars-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
    opacity: 0;
  }

  @keyframes twinkle {
    0% { opacity: 0.1; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1.2); }
  }

  .confetti-wrap {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }

  .conf {
    position: absolute;
    top: -20px;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: fall var(--fd) linear infinite;
    animation-delay: var(--fdelay);
    opacity: 0.85;
  }

  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 0.9; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0.1; }
  }

  .loader-container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 2rem;
    text-align: center;
  }

  .big-emoji-row {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
    font-size: 3.5rem;
    filter: drop-shadow(0 0 18px rgba(255,214,0,0.5));
  }

  .emoji-bounce {
    display: inline-block;
    animation: bigBounce 1.8s ease-in-out infinite;
  }
  .emoji-bounce:nth-child(1) { animation-delay: 0s; }
  .emoji-bounce:nth-child(2) { animation-delay: 0.25s; }
  .emoji-bounce:nth-child(3) { animation-delay: 0.5s; }
  .emoji-bounce:nth-child(4) { animation-delay: 0.75s; }
  .emoji-bounce:nth-child(5) { animation-delay: 1s; }

  @keyframes bigBounce {
    0%, 100% { transform: translateY(0) scale(1); }
    40% { transform: translateY(-18px) scale(1.15); }
    60% { transform: translateY(-10px) scale(1.08); }
  }

  .park-title {
    font-family: 'Bangers', cursive;
    font-size: 4.5rem;
    letter-spacing: 0.06em;
    line-height: 1;
    margin-bottom: 0.4rem;
    background: linear-gradient(135deg, #FFD600 0%, #FF6B00 40%, #FF3CAC 80%, #7B2FFF 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: titleGlow 2s ease-in-out infinite alternate;
  }

  @keyframes titleGlow {
    from { filter: drop-shadow(0 0 12px rgba(255,214,0,0.3)); }
    to   { filter: drop-shadow(0 0 30px rgba(255,107,0,0.6)); }
  }

  .park-subtitle {
    font-size: 0.9rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(170,170,200,0.8);
    margin-bottom: 2.5rem;
    font-weight: 700;
  }

  .wheel-wrap {
    position: relative;
    width: 120px;
    height: 120px;
    margin-bottom: 2rem;
  }

  .wheel-wrap svg {
    animation: spinWheel 4s linear infinite;
    transform-origin: center;
  }

  @keyframes spinWheel {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .rocket-track {
    position: relative;
    width: 280px;
    height: 40px;
    margin-bottom: 1.5rem;
  }

  .track-line {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.08);
    transform: translateY(-50%);
    overflow: hidden;
  }

  .track-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, #7B2FFF, #FF3CAC, #FF6B00, #FFD600);
    animation: fillBar 2.5s ease-in-out infinite;
  }

  @keyframes fillBar {
    0%   { width: 0%; }
    100% { width: 100%; }
  }

  .rocket {
    position: absolute;
    top: 50%;
    font-size: 1.6rem;
    transform: translateY(-50%) rotate(90deg);
    animation: rocketMove 2.5s ease-in-out infinite;
    filter: drop-shadow(0 0 8px rgba(255,107,0,0.7));
  }

  @keyframes rocketMove {
    0%   { left: 0%; }
    100% { left: calc(100% - 30px); }
  }

  .loading-text {
    font-size: 1rem;
    font-weight: 700;
    color: rgba(200,200,230,0.9);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    height: 1.5rem;
    overflow: hidden;
    position: relative;
    margin-bottom: 2rem;
  }

  .loading-text-inner {
    animation: cycleTexts 8s linear infinite;
  }

  .loading-line {
    height: 1.5rem;
    line-height: 1.5rem;
  }

  @keyframes cycleTexts {
    0%   { transform: translateY(0); }
    20%  { transform: translateY(0); }
    25%  { transform: translateY(-1.5rem); }
    45%  { transform: translateY(-1.5rem); }
    50%  { transform: translateY(-3rem); }
    70%  { transform: translateY(-3rem); }
    75%  { transform: translateY(-4.5rem); }
    95%  { transform: translateY(-4.5rem); }
    100% { transform: translateY(-6rem); }
  }

  .dots {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    animation: dotPop 1.2s ease-in-out infinite;
  }

  .dot:nth-child(1) { background: #FFD600; animation-delay: 0s; }
  .dot:nth-child(2) { background: #FF6B00; animation-delay: 0.15s; }
  .dot:nth-child(3) { background: #FF3CAC; animation-delay: 0.3s; }
  .dot:nth-child(4) { background: #7B2FFF; animation-delay: 0.45s; }
  .dot:nth-child(5) { background: #0057FF; animation-delay: 0.6s; }
  .dot:nth-child(6) { background: #00C853; animation-delay: 0.75s; }

  @keyframes dotPop {
    0%, 100% { transform: scale(0.6); opacity: 0.4; }
    50% { transform: scale(1.3); opacity: 1; }
  }

  .pct-ring-wrap {
    position: relative;
    width: 80px;
    height: 80px;
    margin-bottom: 1.5rem;
  }

  .pct-svg {
    transform: rotate(-90deg);
  }

  .ring-track {
    fill: none;
    stroke: rgba(255,255,255,0.08);
    stroke-width: 6;
  }

  .ring-fill {
    fill: none;
    stroke: url(#ringGrad);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 226;
    stroke-dashoffset: 226;
    animation: ringFill 2.5s ease-in-out infinite;
  }

  @keyframes ringFill {
    0%   { stroke-dashoffset: 226; }
    100% { stroke-dashoffset: 0; }
  }

  .pct-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bangers', cursive;
    font-size: 1.4rem;
    color: #FFD600;
    letter-spacing: 0.02em;
  }

  .badges-row {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 1.5rem;
  }

  .fun-badge {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px;
    padding: 0.35rem 0.9rem;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    animation: badgePulse 2.5s ease-in-out infinite;
  }

  .fun-badge:nth-child(1) { color: #FFD600; animation-delay: 0s; }
  .fun-badge:nth-child(2) { color: #FF6B00; animation-delay: 0.4s; }
  .fun-badge:nth-child(3) { color: #FF3CAC; animation-delay: 0.8s; }
  .fun-badge:nth-child(4) { color: #00C853; animation-delay: 1.2s; }

  @keyframes badgePulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.06); opacity: 1; }
  }

  .burst {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: 
      radial-gradient(ellipse at 20% 30%, rgba(255,107,0,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 70%, rgba(123,47,255,0.09) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 0%,  rgba(255,214,0,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%,rgba(0,87,255,0.07)  0%, transparent 50%);
  }

  * {
  user-select: none;
  -webkit-user-select: none;
}

</style>
</head>
<body>

<div class="burst"></div>
<div class="stars-layer" id="starsLayer"></div>
<div class="confetti-wrap" id="confettiWrap"></div>

<div class="loader-container">

  <div class="big-emoji-row">
    <span class="emoji-bounce">🎢</span>
    <span class="emoji-bounce">🎠</span>
    <span class="emoji-bounce">🎡</span>
    <span class="emoji-bounce">🏎️</span>
    <span class="emoji-bounce">🎯</span>
  </div>

  <div class="park-title">ПАРК<br>АТТРАКЦИОНОВ</div>
  <div class="park-subtitle">Ташкент · Загрузка</div>

  <div class="wheel-wrap">
    <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#FF3CAC"/>
          <stop offset="100%" stop-color="#FFD600"/>
        </linearGradient>
      </defs>
      <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(0,87,255,0.25)" stroke-width="8"/>
      <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(0,87,255,0.5)" stroke-width="2"/>
      <line x1="60" y1="8"  x2="60" y2="112" stroke="rgba(0,87,255,0.4)" stroke-width="1.5"/>
      <line x1="8"  y1="60" x2="112" y2="60" stroke="rgba(0,87,255,0.4)" stroke-width="1.5"/>
      <line x1="23" y1="23" x2="97" y2="97"  stroke="rgba(0,87,255,0.3)" stroke-width="1.2"/>
      <line x1="97" y1="23" x2="23" y2="97"  stroke="rgba(0,87,255,0.3)" stroke-width="1.2"/>
      <rect x="48" y="2"  width="24" height="14" rx="5" fill="rgba(0,87,255,0.5)" stroke="rgba(100,170,255,0.8)" stroke-width="1.5"/>
      <rect x="98" y="48" width="18" height="12" rx="4" fill="rgba(255,60,172,0.5)" stroke="rgba(255,150,220,0.8)" stroke-width="1.5"/>
      <rect x="48" y="104" width="24" height="14" rx="5" fill="rgba(123,47,255,0.5)" stroke="rgba(180,130,255,0.8)" stroke-width="1.5"/>
      <rect x="4"  y="48" width="18" height="12" rx="4" fill="rgba(255,214,0,0.5)" stroke="rgba(255,230,100,0.8)" stroke-width="1.5"/>
      <circle cx="60" cy="60" r="8" fill="rgba(255,214,0,0.7)" stroke="rgba(255,230,100,0.9)" stroke-width="2"/>
      <circle cx="60" cy="60" r="3" fill="#FFD600"/>
    </svg>
  </div>

  <div class="pct-ring-wrap">
    <svg class="pct-svg" width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#FF3CAC"/>
          <stop offset="100%" stop-color="#FFD600"/>
        </linearGradient>
      </defs>
      <circle class="ring-track" cx="40" cy="40" r="36"/>
      <circle class="ring-fill"  cx="40" cy="40" r="36"/>
    </svg>
    <div class="pct-label" id="pctLabel">0%</div>
  </div>

  <div class="rocket-track">
    <div class="track-line">
      <div class="track-fill"></div>
    </div>
    <div class="rocket">🚀</div>
  </div>

  <div class="loading-text">
    <div class="loading-text-inner">
      <div class="loading-line">🎉 Готовим аттракционы...</div>
      <div class="loading-line">⚡ Заряжаем лазеры...</div>
      <div class="loading-line">🎠 Раскручиваем карусели...</div>
      <div class="loading-line">🏎️ Прогреваем двигатели...</div>
      <div class="loading-line">🎉 Готовим аттракционы...</div>
    </div>
  </div>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div class="badges-row">
    <span class="fun-badge">🎟 10 аттракционов</span>
    <span class="fun-badge">⭐ С 2024 года</span>
    <span class="fun-badge">🎉 Весело всем</span>
    <span class="fun-badge">📍 Ташкент</span>
  </div>

</div>

<script>
  // Звёзды
  const sl = document.getElementById('starsLayer');
  const starColors = ['#fff','#FFD600','#FF3CAC','#7B2FFF','#0057FF','#00C853'];
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      width:${size}px;height:${size}px;
      background:${starColors[Math.floor(Math.random()*starColors.length)]};
      --d:${1.5+Math.random()*3}s;
      animation-delay:${Math.random()*3}s;
    `;
    sl.appendChild(s);
  }

  // Конфетти
  const cw = document.getElementById('confettiWrap');
  const confColors = ['#FFD600','#FF6B00','#FF3CAC','#7B2FFF','#0057FF','#00C853','#E8001D','#FF80AB'];
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'conf';
    const isCircle = Math.random() > 0.5;
    c.style.cssText = `
      left:${Math.random()*100}%;
      background:${confColors[Math.floor(Math.random()*confColors.length)]};
      width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;
      border-radius:${isCircle ? '50%' : '2px'};
      --fd:${4+Math.random()*6}s;
      --fdelay:-${Math.random()*6}s;
    `;
    cw.appendChild(c);
  }

  // Счётчик процентов
  const pctLabel = document.getElementById('pctLabel');
let startTime = null;
const duration = 2500;

function animatePct(timestamp) {
  if (!startTime) startTime = timestamp;

  const elapsed = timestamp - startTime;
  let pct = Math.round((elapsed / duration) * 100);

  if (pct >= 100) {
    pct = 100;
    pctLabel.textContent = pct + '%';

    // ⏩ Переход на сайт
    setTimeout(() => {
      window.location.href = "main.html";
    }, 300); // небольшая пауза для красоты

    return; // остановить анимацию
  }

  pctLabel.textContent = pct + '%';
  requestAnimationFrame(animatePct);
}

requestAnimationFrame(animatePct);
</script>
</body>
</html>
